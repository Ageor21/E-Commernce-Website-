{% extends "base.html" %}

{% block title %}Register - Aaron's Tech{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-copy">
        <span class="eyebrow">Join the shop</span>
        <h1>Create your Aaron's Tech account.</h1>
        <p>Track orders, leave reviews, and enjoy a cleaner checkout experience.</p>
    </div>

    <form method="post" action="{{ url_for('register') }}" class="modern-form auth-form reveal-card">
        <h2>Create Account</h2>

        <label for="name">Name</label>
        <input type="text" name="name" id="name" placeholder="Enter your full name" required>

        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Enter your password" required>

        <button type="submit" class="button button-primary">Register</button>

        <p class="form-footer">Already have an account? <a href="{{ url_for('login') }}">Login here</a>.</p>
    </form>
</section>
{% endblock %}
