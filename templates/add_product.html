{% extends "base.html" %}

{% block title %}Add Product - Aaron's Tech{% endblock %}

{% block content %}
<section class="auth-layout single">
    <form method="post" action="{{ url_for('add_product') }}" class="modern-form auth-form reveal-card">
        <span class="eyebrow">Admin</span>
        <h1>Add Product</h1>

        <label for="name">Product Name</label>
        <input type="text" id="name" name="name" placeholder="Product name" required>

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4" placeholder="Product description"></textarea>

        <label for="price">Price</label>
        <input type="number" id="price" name="price" step="0.01" placeholder="0.00" required>

        <label for="stock">Stock</label>
        <input type="number" id="stock" name="stock" placeholder="0" required>

        <label for="image_url">Image URL</label>
        <input type="url" id="image_url" name="image_url" placeholder="https://example.com/product.jpg">

        <button type="submit" class="button button-primary">Create Product</button>
        <a href="{{ url_for('admin_dashboard') }}" class="text-link">Back to Admin</a>
    </form>
</section>
{% endblock %}
