{% extends "base.html" %}

{% block title %}Login - Aaron's Tech{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-copy">
        <span class="eyebrow">Welcome back</span>
        <h1>Sign in and get back to your cart.</h1>
        <p>Access your profile, order history, reviews, and saved shopping activity.</p>
    </div>

    <form method="post" action="{{ url_for('login') }}" class="modern-form auth-form reveal-card">
        <h2>Login</h2>

        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Enter your password" required>

        <button type="submit" class="button button-primary">Login</button>

        <p class="form-footer">Don't have an account? <a href="{{ url_for('register') }}">Register here</a>.</p>
    </form>
</section>
{% endblock %}
