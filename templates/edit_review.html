{% extends "base.html" %}

{% block title %}Edit Review - Aaron's Tech{% endblock %}

{% block content %}
<section class="auth-layout single">
    <form method="post" class="modern-form auth-form reveal-card">
        <span class="eyebrow">Review</span>
        <h1>Edit Your Review</h1>

        <label for="rating">Rating</label>
        <select name="rating" id="rating" required>
            {% for i in range(1, 6) %}
            <option value="{{ i }}" {% if i == review.rating %}selected{% endif %}>{{ i }} Stars</option>
            {% endfor %}
        </select>

        <label for="content">Your Review</label>
        <textarea name="content" id="content" rows="4" required>{{ review.content }}</textarea>

        <button type="submit" class="button button-primary">Update Review</button>
        <a href="{{ url_for('product_view', product_id=product_id) }}" class="text-link">Back to Product</a>
    </form>
</section>
{% endblock %}
