{% extends "base.html" %}

{% block title %}Edit Product - Aaron's Tech{% endblock %}

{% block content %}
<section class="auth-layout single">
    <form method="post" action="{{ url_for('edit_product', product_id=product.id) }}" class="modern-form auth-form reveal-card">
        <span class="eyebrow">Admin</span>
        <h1>Edit Product</h1>

        <label for="name">Product Name</label>
        <input type="text" id="name" name="name" value="{{ product.name }}" required>

        <label for="price">Price</label>
        <input type="number" id="price" name="price" step="0.01" value="{{ product.price }}" required>

        <label for="stock">Stock</label>
        <input type="number" id="stock" name="stock" value="{{ product.stock }}" required>

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4">{{ product.description }}</textarea>

        <button type="submit" class="button button-primary">Update Product</button>
        <a href="{{ url_for('admin_dashboard') }}" class="text-link">Back to Admin</a>
    </form>
</section>
{% endblock %}
